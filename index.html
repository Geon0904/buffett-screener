<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Buffett Screener · 가치투자 진단소</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --paper: #f4ede0;
    --paper-2: #ebe1cf;
    --ink: #1a1611;
    --ink-2: #4a3f30;
    --ink-3: #756851;
    --rule: #c9bca0;
    --accent: #7a1f1f;
    --gold: #8a6d2e;
    --green: #3d5c3a;
    --amber: #a06820;
    --red: #7a1f1f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'IBM Plex Sans KR', sans-serif;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(122, 31, 31, 0.03) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(138, 109, 46, 0.04) 0%, transparent 40%);
    background-attachment: fixed;
  }
  .serif { font-family: 'Cormorant Garamond', serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .container { max-width: 1080px; margin: 0 auto; padding: 0 32px; }

  /* LANG TOGGLE */
  .lang-toggle {
    position: fixed;
    top: 20px;
    right: 24px;
    z-index: 100;
    display: flex;
    background: var(--paper);
    border: 1px solid var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    box-shadow: 2px 2px 0 rgba(26, 22, 17, 0.15);
  }
  .lang-toggle button {
    background: transparent;
    border: none;
    padding: 8px 14px;
    cursor: pointer;
    color: var(--ink-3);
    font-family: inherit;
    font-size: inherit;
    letter-spacing: inherit;
    transition: all 0.15s ease;
  }
  .lang-toggle button:hover { color: var(--ink); }
  .lang-toggle button.active { background: var(--ink); color: var(--paper); }
  .lang-toggle button + button { border-left: 1px solid var(--ink); }

  /* MASTHEAD */
  .masthead { border-bottom: 2px double var(--ink); padding: 24px 0 18px; }
  .masthead-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-3);
    border-bottom: 0.5px solid var(--rule);
    padding-bottom: 8px;
    margin-bottom: 18px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .masthead h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: clamp(54px, 8vw, 88px);
    line-height: 0.95;
    letter-spacing: -0.02em;
    text-align: center;
    font-style: italic;
  }
  .masthead h1 .ampersand { font-weight: 400; color: var(--accent); }
  .masthead-sub {
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-style: italic;
    color: var(--ink-2);
    margin-top: 6px;
    letter-spacing: 0.04em;
  }
  .masthead-rule {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 14px;
    margin-top: 12px;
    color: var(--ink-3);
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }
  .masthead-rule::before, .masthead-rule::after {
    content: '';
    height: 1px;
    background: var(--rule);
    flex: 1;
    max-width: 180px;
  }

  /* HERO QUOTE */
  .hero-quote { text-align: center; padding: 56px 16px 48px; border-bottom: 0.5px solid var(--rule); }
  .hero-quote blockquote {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(24px, 3.5vw, 34px);
    font-style: italic;
    line-height: 1.35;
    color: var(--ink);
    max-width: 720px;
    margin: 0 auto 16px;
    position: relative;
  }
  .hero-quote blockquote::before {
    content: '\201C';
    font-size: 88px;
    color: var(--accent);
    position: absolute;
    top: -36px;
    left: -8px;
    font-family: 'Cormorant Garamond', serif;
    line-height: 1;
    opacity: 0.6;
  }
  .hero-quote cite { font-style: normal; font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-3); }

  section { padding: 56px 0; border-bottom: 0.5px solid var(--rule); }

  .section-label {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    padding-bottom: 6px;
    border-bottom: 1px solid var(--accent);
    margin-bottom: 20px;
  }
  h2.section-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: clamp(34px, 4.5vw, 46px);
    line-height: 1.1;
    letter-spacing: -0.01em;
    margin-bottom: 16px;
  }
  h2.section-title em { color: var(--accent); font-weight: 600; }
  .lede {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    line-height: 1.55;
    color: var(--ink-2);
    max-width: 680px;
    margin-bottom: 32px;
  }

  /* CRITERIA */
  .criteria-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    border-top: 1px solid var(--ink);
    border-left: 1px solid var(--ink);
    margin-top: 16px;
  }
  .criterion {
    padding: 24px 22px;
    border-right: 1px solid var(--ink);
    border-bottom: 1px solid var(--ink);
    background: var(--paper);
  }
  .criterion-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 52px;
    font-style: italic;
    line-height: 1;
    color: var(--accent);
    opacity: 0.85;
    margin-bottom: 8px;
  }
  .criterion-title { font-weight: 600; font-size: 15px; margin-bottom: 6px; }
  .criterion-formula {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-3);
    background: var(--paper-2);
    padding: 6px 8px;
    border-radius: 2px;
    margin-bottom: 10px;
    display: inline-block;
  }
  .criterion-desc { font-size: 13px; color: var(--ink-2); line-height: 1.55; }

  /* CAUTIONS */
  .cautions {
    background: var(--paper-2);
    padding: 36px 32px;
    margin-top: 28px;
    border-left: 4px solid var(--accent);
  }
  .cautions h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 600;
    font-style: italic;
    margin-bottom: 16px;
    color: var(--accent);
  }
  .cautions ol { list-style: none; counter-reset: caut; }
  .cautions li {
    counter-increment: caut;
    padding: 12px 0 12px 44px;
    position: relative;
    border-bottom: 0.5px dashed var(--rule);
    font-size: 14.5px;
    line-height: 1.6;
  }
  .cautions li:last-child { border-bottom: none; }
  .cautions li::before {
    content: counter(caut, upper-roman) ".";
    position: absolute;
    left: 0;
    top: 12px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--accent);
    font-style: italic;
    width: 36px;
  }
  .cautions strong { color: var(--ink); font-weight: 600; }

  /* SCREENER */
  .screener-intro { text-align: center; margin-bottom: 32px; }
  .screener-intro .section-label { color: var(--gold); border-bottom-color: var(--gold); }
  .ticker-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 32px; }
  .ticker-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    background: transparent;
    border: 1px solid var(--ink);
    color: var(--ink);
    padding: 10px 18px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.15s ease;
  }
  .ticker-btn:hover { background: var(--ink); color: var(--paper); }
  .ticker-btn.active { background: var(--accent); border-color: var(--accent); color: var(--paper); }
  .ticker-btn .co {
    font-family: 'IBM Plex Sans KR', sans-serif;
    font-weight: 300;
    font-size: 11px;
    margin-left: 6px;
    opacity: 0.7;
  }

  .verdict-card {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    border: 1px solid var(--ink);
    background: var(--paper);
    margin-bottom: 28px;
  }
  .verdict-left { padding: 28px 32px; border-right: 1px solid var(--ink); }
  .verdict-right { padding: 28px 32px; background: var(--paper-2); }
  .verdict-stamp { font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 8px; }
  .verdict-ticker { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--ink-3); margin-bottom: 2px; }
  .verdict-company {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-weight: 600;
    line-height: 1.1;
    margin-bottom: 18px;
  }
  .score-line { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
  .score-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 68px;
    font-weight: 600;
    line-height: 0.9;
  }
  .score-denom { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-style: italic; color: var(--ink-3); }
  .verdict-pill {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 600;
    padding: 6px 14px;
    border: 1px solid currentColor;
  }
  .verdict-pill.good { color: var(--green); }
  .verdict-pill.mid  { color: var(--amber); }
  .verdict-pill.bad  { color: var(--red); }
  .verdict-narrative {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 17px;
    line-height: 1.55;
    color: var(--ink-2);
  }
  .verdict-narrative::first-letter {
    font-size: 38px;
    font-weight: 600;
    float: left;
    line-height: 0.9;
    padding-right: 6px;
    color: var(--accent);
  }

  /* CHARTS */
  .charts-row { display: grid; grid-template-columns: 1.3fr 1fr; gap: 24px; margin-bottom: 28px; }
  .panel { background: var(--paper); border: 1px solid var(--ink); padding: 22px; }
  .panel-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 0.5px solid var(--rule);
    padding-bottom: 10px;
    margin-bottom: 16px;
  }
  .panel-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; }
  .panel-meta { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-3); }
  .radar-wrap { position: relative; height: 340px; }

  .indicator-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 52px;
    font-weight: 600;
    line-height: 1;
    color: var(--accent);
  }
  .indicator-label { font-size: 12px; color: var(--ink-3); margin-bottom: 18px; }
  .indicator-bar {
    position: relative;
    height: 10px;
    background: var(--paper-2);
    border: 0.5px solid var(--rule);
    margin-bottom: 6px;
  }
  .indicator-fill {
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, var(--green) 0%, var(--green) 35%, var(--gold) 50%, var(--amber) 70%, var(--accent) 100%);
  }
  .indicator-marker {
    position: absolute;
    top: -4px;
    width: 2px;
    height: 18px;
    background: var(--ink);
  }
  .indicator-marker::after {
    content: '';
    position: absolute;
    top: -4px;
    left: -3px;
    width: 8px;
    height: 8px;
    background: var(--ink);
    transform: rotate(45deg);
  }
  .indicator-scale {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-3);
    margin-top: 6px;
  }
  .indicator-note {
    font-size: 12.5px;
    color: var(--ink-2);
    margin-top: 16px;
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
    line-height: 1.5;
  }

  /* DETAIL LIST */
  .crit-detail-list {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-top: 0.5px solid var(--rule);
    border-left: 0.5px solid var(--rule);
  }
  .crit-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    border-right: 0.5px solid var(--rule);
    border-bottom: 0.5px solid var(--rule);
    background: var(--paper);
  }
  .crit-row-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-style: italic;
    color: var(--ink-3);
    width: 24px;
  }
  .crit-row-body { flex: 1; min-width: 0; }
  .crit-row-name { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
  .crit-row-value { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--ink-3); }
  .crit-row-score {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    min-width: 48px;
    text-align: right;
  }
  .crit-row-score.good { color: var(--green); }
  .crit-row-score.mid  { color: var(--amber); }
  .crit-row-score.bad  { color: var(--red); }

  /* FOOTER */
  footer { padding: 48px 0 64px; text-align: center; color: var(--ink-3); font-size: 12px; letter-spacing: 0.05em; }
  footer .ornament { font-family: 'Cormorant Garamond', serif; font-size: 24px; color: var(--accent); margin-bottom: 12px; }
  footer .disclaimer {
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    max-width: 540px;
    margin: 12px auto 0;
    line-height: 1.55;
  }

  @media (max-width: 720px) {
    .container { padding: 0 20px; }
    .lang-toggle { top: 12px; right: 12px; }
    .verdict-card { grid-template-columns: 1fr; }
    .verdict-left { border-right: none; border-bottom: 1px solid var(--ink); }
    .charts-row { grid-template-columns: 1fr; }
    .crit-detail-list { grid-template-columns: 1fr; }
    section { padding: 40px 0; }
    .hero-quote { padding: 36px 12px; }
    .masthead-top { font-size: 9px; }
  }
</style>
</head>
<body>

<div class="lang-toggle" role="group" aria-label="Language">
  <button data-lang="ko" class="active">KO</button>
  <button data-lang="en">EN</button>
</div>

<header class="container masthead">
  <div class="masthead-top">
    <span data-i18n="vol"></span>
    <span data-i18n="masthead-mid"></span>
    <span data-i18n="masthead-right"></span>
  </div>
  <h1>The Buffett <span class="ampersand">&amp;</span> Screener</h1>
  <div class="masthead-sub" data-i18n="sub"></div>
  <div class="masthead-rule" data-i18n="rule"></div>
</header>

<section class="hero-quote" style="border-top: none;">
  <div class="container">
    <blockquote data-i18n="quote"></blockquote>
    <cite>— Warren E. Buffett</cite>
  </div>
</section>

<section>
  <div class="container">
    <span class="section-label" data-i18n="ch1-label"></span>
    <h2 class="section-title" data-i18n="ch1-title" data-html="1"></h2>
    <p class="lede" data-i18n="ch1-lede" data-html="1"></p>
    <div class="criteria-grid" id="criteria-grid"></div>
    <div class="cautions">
      <h3 data-i18n="cautions-title"></h3>
      <ol id="cautions-list"></ol>
    </div>
  </div>
</section>

<section>
  <div class="container">
    <div class="screener-intro">
      <span class="section-label" style="color: var(--gold); border-bottom-color: var(--gold);" data-i18n="ch2-label"></span>
      <h2 class="section-title" data-i18n="ch2-title" data-html="1"></h2>
      <p class="lede" style="margin: 0 auto;" data-i18n="ch2-lede"></p>
    </div>

    <div class="ticker-row">
      <button class="ticker-btn active" data-ticker="AAPL">AAPL<span class="co">Apple</span></button>
      <button class="ticker-btn" data-ticker="KO">KO<span class="co">Coca-Cola</span></button>
      <button class="ticker-btn" data-ticker="MSFT">MSFT<span class="co">Microsoft</span></button>
      <button class="ticker-btn" data-ticker="JNJ">JNJ<span class="co">Johnson &amp; Johnson</span></button>
      <button class="ticker-btn" data-ticker="TSLA">TSLA<span class="co">Tesla</span></button>
      <button class="ticker-btn" data-ticker="F">F<span class="co">Ford</span></button>
      <button class="ticker-btn" data-ticker="NVDA">NVDA<span class="co">NVIDIA</span></button>
    </div>

    <div class="verdict-card">
      <div class="verdict-left">
        <div class="verdict-stamp" data-i18n="verdict-stamp"></div>
        <div class="verdict-ticker mono" id="v-ticker"></div>
        <div class="verdict-company serif" id="v-company"></div>
        <div class="score-line">
          <span class="score-num serif" id="v-score"></span>
          <span class="score-denom">/ 100</span>
        </div>
        <span class="verdict-pill good" id="v-pill"></span>
      </div>
      <div class="verdict-right">
        <div class="verdict-stamp" data-i18n="editor-stamp"></div>
        <p class="verdict-narrative" id="v-narrative"></p>
      </div>
    </div>

    <div class="charts-row">
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title serif" data-i18n="radar-title"></div>
          <div class="panel-meta">Radar Chart</div>
        </div>
        <div class="radar-wrap">
          <canvas id="radar" role="img" aria-label="Radar chart"></canvas>
        </div>
      </div>
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title serif" data-i18n="indicator-title"></div>
          <div class="panel-meta">Buffett Indicator</div>
        </div>
        <div class="indicator-value serif">208<span style="font-size:24px;">%</span></div>
        <div class="indicator-label" data-i18n="indicator-label" data-html="1"></div>
        <div class="indicator-bar">
          <div class="indicator-fill"></div>
          <div class="indicator-marker" style="left: 83%;"></div>
        </div>
        <div class="indicator-scale">
          <span>50%</span><span>100%</span><span>150%</span><span>200%</span><span>250%</span>
        </div>
        <p class="indicator-note" data-i18n="indicator-note" data-html="1"></p>
      </div>
    </div>

    <div class="panel" style="padding: 0;">
      <div class="panel-head" style="padding: 16px 22px; margin-bottom: 0;">
        <div class="panel-title serif" data-i18n="detail-title"></div>
        <div class="panel-meta">Line-by-line</div>
      </div>
      <div class="crit-detail-list" id="crit-list"></div>
    </div>
  </div>
</section>

<footer class="container">
  <div class="ornament serif">❦</div>
  <div data-i18n="footer-title"></div>
  <div style="margin-top: 6px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.15em;">v0.2 · STATIC DEMO BUILD</div>
  <p class="disclaimer" data-i18n="disclaimer"></p>
</footer>

<script>
const i18n = {
  ko: {
    vol: 'Vol. I · No. 1',
    'masthead-mid': '오마하 · 인내하는 투자자를 위하여',
    'masthead-right': '가치투자 진단소',
    sub: '— 워런 버핏의 6대 기준으로 종목을 평가합니다 —',
    rule: '데이터 · 원칙 · 인내',
    quote: '가격은 당신이 지불하는 것이고, 가치는 당신이 얻는 것이다.',
    'ch1-label': '제 1장 · The Six Pillars',
    'ch1-title': '버핏의 <em>여섯 가지</em> 잣대',
    'ch1-lede': '버핏은 단순한 PER이나 PBR을 보지 않습니다. 기업이 <em>주주의 자본을 얼마나 효율적으로 굴리는가</em>, <em>빚 없이 스스로 성장할 수 있는가</em>를 봅니다. 아래 여섯 가지는 그가 50년간 변함없이 적용해 온 정량 기준입니다.',
    'cautions-title': '주의할 점 · Caveats',
    'ch2-label': '제 2장 · The Diagnostic',
    'ch2-title': '종목 <em>진단</em>',
    'ch2-lede': '아래 종목 중 하나를 골라보세요. 6대 기준을 통과하는지 즉시 보여드립니다.',
    'verdict-stamp': '— 최종 평가 —',

const scoresMap = {
  AAPL: [92, 70, 85, 88, 75, 90],
  KO:   [88, 60, 65, 82, 70, 80],
  MSFT: [85, 90, 95, 80, 88, 92],
  JNJ:  [78, 82, 60, 75, 68, 72],
  TSLA: [55, 65, 80, 40, 50, 30],
  F:    [40, 25, 35, 30, 45, 55],
  NVDA: [95, 88, 98, 70, 85, 80]
};
const companies = {
  AAPL: { name: 'Apple Inc.',            exchange: 'NASDAQ' },
  KO:   { name: 'The Coca-Cola Company', exchange: 'NYSE' },
  MSFT: { name: 'Microsoft Corporation', exchange: 'NASDAQ' },
  JNJ:  { name: 'Johnson & Johnson',     exchange: 'NYSE' },
  TSLA: { name: 'Tesla, Inc.',           exchange: 'NASDAQ' },
  F:    { name: 'Ford Motor Company',    exchange: 'NYSE' },
  NVDA: { name: 'NVIDIA Corporation',    exchange: 'NASDAQ' }
};

let currentLang = 'ko';
let currentTicker = 'AAPL';
let radar;

function scoreClass(s) { return s >= 70 ? 'good' : (s >= 50 ? 'mid' : 'bad'); }

function applyI18n() {
  const t = i18n[currentLang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (!(key in t)) return;
    if (el.getAttribute('data-html') === '1') el.innerHTML = t[key];
    else el.textContent = t[key];
  });
  document.documentElement.lang = currentLang;

  const grid = document.getElementById('criteria-grid');
  grid.innerHTML = t.criteria.map(c => `
    <div class="criterion">
      <div class="criterion-num">${c.num}</div>
      <div class="criterion-title">${c.title}</div>
      <div class="criterion-formula">${c.formula}</div>
      <div class="criterion-desc">${c.desc}</div>
    </div>
  `).join('');

  document.getElementById('cautions-list').innerHTML =
    t.cautions.map(c => `<li>${c}</li>`).join('');

  if (radar) {
    radar.data.labels = t.radarLabels;
    radar.update();
  }
  updateTicker(currentTicker);
}

function updateTicker(ticker) {
  currentTicker = ticker;
  const t = i18n[currentLang];
  const co = companies[ticker];
  const td = t.tickerData[ticker];
  const sc = scoresMap[ticker];
  const avg = Math.round(sc.reduce((a,b) => a+b, 0) / sc.length);

  document.getElementById('v-ticker').textContent = co.exchange + ' : ' + ticker;
  document.getElementById('v-company').textContent = co.name;
  document.getElementById('v-score').textContent = avg;
  document.getElementById('v-narrative').textContent = td.narrative;

  const cls = scoreClass(avg);
  const pill = document.getElementById('v-pill');
  pill.textContent = t.verdictLabels[cls];
  pill.className = 'verdict-pill ' + cls;

  document.getElementById('crit-list').innerHTML = sc.map((s, i) => `
    <div class="crit-row">
      <div class="crit-row-num serif">${['I','II','III','IV','V','VI'][i]}.</div>
      <div class="crit-row-body">
        <div class="crit-row-name">${t.criteriaShort[i]}</div>
        <div class="crit-row-value">${td.raw[i]}</div>
      </div>
      <div class="crit-row-score serif ${scoreClass(s)}">${s}</div>
    </div>
  `).join('');

  if (radar) {
    radar.data.datasets[0].data = sc;
    radar.update();
  }
}

// init chart
const ctx = document.getElementById('radar').getContext('2d');
radar = new Chart(ctx, {
  type: 'radar',
  data: {
    labels: i18n.ko.radarLabels,
    datasets: [{
      data: scoresMap.AAPL,
      backgroundColor: 'rgba(122, 31, 31, 0.18)',
      borderColor: '#7a1f1f',
      borderWidth: 2,
      pointBackgroundColor: '#7a1f1f',
      pointBorderColor: '#f4ede0',
      pointBorderWidth: 1.5,
      pointRadius: 4,
      pointHoverRadius: 6
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 700, easing: 'easeOutQuart' },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#1a1611',
        titleFont: { family: 'IBM Plex Sans KR' },
        bodyFont: { family: 'JetBrains Mono', size: 12 },
        padding: 10,
        callbacks: { label: (c) => c.parsed.r + ' / 100' }
      }
    },
    scales: {
      r: {
        min: 0, max: 100,
        ticks: { stepSize: 25, font: { size: 10, family: 'JetBrains Mono' }, color: '#756851', backdropColor: 'transparent' },
        pointLabels: { font: { size: 12, family: 'IBM Plex Sans KR', weight: '500' }, color: '#1a1611' },
        grid: { color: 'rgba(201, 188, 160, 0.6)' },
        angleLines: { color: 'rgba(201, 188, 160, 0.8)' }
      }
    }
  }
});

document.querySelectorAll('.ticker-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ticker-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    updateTicker(btn.dataset.ticker);
  });
});

document.querySelectorAll('.lang-toggle button').forEach(btn => {
  btn.addEventListener('click', () => {
    const lang = btn.dataset.lang;
    if (lang === currentLang) return;
    currentLang = lang;
    document.querySelectorAll('.lang-toggle button').forEach(b =>
      b.classList.toggle('active', b.dataset.lang === lang));
    try { localStorage.setItem('buffett-lang', lang); } catch (e) {}
    applyI18n();
  });
});

// restore saved language
try {
  const saved = localStorage.getItem('buffett-lang');
  if (saved === 'en' || saved === 'ko') {
    currentLang = saved;
    document.querySelectorAll('.lang-toggle button').forEach(b =>
      b.classList.toggle('active', b.dataset.lang === saved));
  }
} catch (e) {}

applyI18n();
